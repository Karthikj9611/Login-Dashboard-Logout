<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  background: linear-gradient(135deg, #1d2671, #c33764);
  min-height: 100vh;
  color: #fff;
}

/* Navbar */
.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 40px;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
}

.navbar h2 {
  font-weight: 600;
}

.logout-btn {
  padding: 8px 18px;
  border-radius: 20px;
  background: #ff4b5c;
  color: #fff;
  text-decoration: none;
  font-size: 14px;
  transition: 0.3s;
}

.logout-btn:hover {
  background: #ff1e38;
}

/* Dashboard Content */
.container {
  padding: 40px;
  text-align: center;
}

.container h1 {
  font-size: 32px;
  margin-bottom: 10px;
}

.container p {
  opacity: 0.8;
}

/* Cards */
.cards {
  margin-top: 40px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
}

.card {
  background: rgba(255,255,255,0.1);
  padding: 25px;
  border-radius: 15px;
  backdrop-filter: blur(10px);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-8px);
  box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

.card h3 {
  margin-bottom: 10px;
}

/* Responsive */
@media(max-width: 600px){
  .navbar {
    padding: 15px;
  }
}
</style>

</head>
<body>

<div class="navbar">
  <h2>My Dashboard</h2>
  <a href="/logout" class="logout-btn">Logout</a>
</div>

<div class="container">
  <h1>Welcome 🎉</h1>
  <p>You are successfully logged in</p>

  <div class="cards">
    <div class="card">
      <h3>👤 Profile</h3>
      <p>View and manage your profile</p>
    </div>

    <div class="card">
      <h3>📊 Analytics</h3>
      <p>Check your activity insights</p>
    </div>

    <div class="card">
      <h3>⚙️ Settings</h3>
      <p>Update your preferences</p>
    </div>

    <div class="card">
      <h3>💬 Support</h3>
      <p>Contact help & support</p>
    </div>
  </div>
</div>

</body>
</html>
